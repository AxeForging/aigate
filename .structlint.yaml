dir_structure:
  allowedPaths:
    - "."
    - "actions/**"
    - "domain/**"
    - "services/**"
    - "helpers/**"
    - "integration/**"
    - "internal/**"
    - "docs/**"
    - "dist/**"
    - ".github/**"
    - ".claude/**"
    - ".agents/**"
    - ".codex/**"
  disallowedPaths:
    - "vendor/**"
    - "node_modules/**"
    - "tmp/**"
    - "temp/**"
    - ".git/**"
    - "*.log"
  requiredPaths:
    - "actions"
    - "domain"
    - "services"
    - "helpers"
    - "docs"

file_naming_pattern:
  allowed:
    - "*.go"
    - "*.mod"
    - "*.sum"
    - "*.yaml"
    - "*.yml"
    - "*.json"
    - "*.toml"
    - "*.md"
    - "*.txt"
    - "*.png"
    - "*.gif"
    - "*.jpg"
    - "*.svg"
    - "*.puml"
    - "*.cast"
    - "*.css"
    - "*.js"
    - "*.tmpl"
    - "README*"
    - "LICENSE*"
    - "CHANGELOG*"
    - "Makefile"
    - "Dockerfile*"
    - "*.sh"
    - ".gitignore"
    - ".editorconfig"
    - ".golangci.yml"
    - ".goreleaser.yaml"
    - ".goreleaser.yml"
    - ".github/**"
  disallowed:
    - "*.env*"
    - ".env*"
    - "*.key"
    - "*.pem"
    - "*.p12"
    - "*.log"
    - "*.tmp"
    - "*.temp"
    - "*~"
    - "*.swp"
    - "*.swo"
    - "*.bak"
    - "*.backup"
    - ".DS_Store"
    - "Thumbs.db"
  required:
    - "go.mod"
    - "README.md"
    - ".gitignore"
    - "main.go"

ignore:
  - ".git"
  - "vendor"
  - "node_modules"
  - "bin"
  - "dist"
  - "build"
  - ".idea"
  - ".vscode"
  - ".DS_Store"
  - ".agents"
  - ".codex"
  - "*.log"
  - "*.tmp"
  - "aigate"
